<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Lady of the Galaxies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep:      #060810;
      --gold:      #C9A84C;
      --gold-dim:  #8a6f2e;
      --parchment: #F0EAD6;
      --silver:    #E8EAF0;
      --silver-dim:#9aa0b8;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--deep);
      color: var(--silver);
      font-family: 'Raleway', sans-serif;
      overflow: hidden;
    }

    /* ── Starfield ── */
    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Page shell ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* ── Title artwork ── */
    .title-art {
      width: min(680px, 92vw);
      display: block;
      animation: fadeIn 1.6s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Divider ── */
    .rule-h {
      width: min(260px, 60vw);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.8rem auto 0;
      animation: fadeIn 2s ease 0.4s both;
    }

    /* ── Navigation ── */
    .nav-group {
      display: flex;
      gap: 1.6rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.8rem;
      animation: fadeIn 2s ease 0.7s both;
    }

    .nav-btn {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--silver-dim);
      text-decoration: none;
      border: 1px solid var(--gold-dim);
      padding: 0.65rem 2rem;
      position: relative;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
      background: transparent;
    }
    .nav-btn:hover {
      color: var(--parchment);
      border-color: var(--gold);
      background: rgba(201,168,76,0.07);
    }
    /* Corner flourishes */
    .nav-btn::before,
    .nav-btn::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      border-color: var(--gold);
      border-style: solid;
      transition: border-color 0.3s;
    }
    .nav-btn::before { top: -1px; left: -1px;  border-width: 1px 0 0 1px; }
    .nav-btn::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .nav-sep {
      width: 1px;
      height: 24px;
      background: var(--gold-dim);
      opacity: 0.45;
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <main class="page">

    <img
      class="title-art"
      src="OLGLOGO.png"
      alt="Our Lady of the Galaxies"
    />

    <div class="rule-h"></div>

    <nav class="nav-group" aria-label="Main navigation">
      <a class="nav-btn" href="painting.html">View the Painting</a>
      <div class="nav-sep" aria-hidden="true"></div>
      <a class="nav-btn" href="prayer.html">A Prayer</a>
    </nav>

  </main>

  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initStars(n = 280) {
      stars = Array.from({ length: n }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.0 + 0.2,
        alpha: Math.random() * 0.6 + 0.12,
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2
      }));
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);
      for (const s of stars) {
        const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,234,240,${a})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
